name: Build and Release ThreatScanner

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: microsoft/setup-msbuild@v2
      - uses: NuGet/setup-nuget@v2
      - name: Restore NuGet
        run: nuget restore ThreatScanner.sln
      - name: Build
        run: msbuild ThreatScanner.sln /p:Configuration=Release /p:Platform="Any CPU"
      - name: Get version
        id: version
        run: |
          $date = Get-Date -Format "yyyy.MM.dd"
          echo "tag=v$date-build${{ github.run_number }}" >> $env:GITHUB_OUTPUT
        shell: pwsh
      - name: Zip
        run: Compress-Archive -Path "ThreatScanner/bin/Release/*" -DestinationPath "ThreatScanner-Release.zip"
        shell: pwsh
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ThreatScanner-${{ steps.version.outputs.tag }}
          path: ThreatScanner/bin/Release/
          retention-days: 30
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ThreatScanner ${{ steps.version.outputs.tag }}
          files: ThreatScanner-Release.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
